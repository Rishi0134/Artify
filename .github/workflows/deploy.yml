name: Deploy Full Stack to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build & Push Backend
      - name: Build & Push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          BACKEND_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_BACKEND_REPO }}:$BACKEND_TAG ./backend
          docker push $ECR_REGISTRY/${{ secrets.ECR_BACKEND_REPO }}:$BACKEND_TAG
          echo "BACKEND_IMAGE=$ECR_REGISTRY/${{ secrets.ECR_BACKEND_REPO }}:$BACKEND_TAG" >> $GITHUB_ENV

      # 5. Build & Push Frontend
      - name: Build & Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          FRONTEND_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_FRONTEND_REPO }}:$FRONTEND_TAG ./frontend
          docker push $ECR_REGISTRY/${{ secrets.ECR_FRONTEND_REPO }}:$FRONTEND_TAG
          echo "FRONTEND_IMAGE=$ECR_REGISTRY/${{ secrets.ECR_FRONTEND_REPO }}:$FRONTEND_TAG" >> $GITHUB_ENV

      # 6. Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      # 7. Deploy Backend
      - name: Deploy Backend
        run: |
          kubectl set image deployment/artifyy-backend backend=$BACKEND_IMAGE
          kubectl rollout status deployment/artifyy-backend

      # 8. Deploy Frontend
      - name: Deploy Frontend
        run: |
          kubectl set image deployment/artifyy-frontend frontend=$FRONTEND_IMAGE
          kubectl rollout status deployment/artifyy-frontend
